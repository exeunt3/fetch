<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Fetch</h1>
        <p>Save and organize links.</p>
      </header>

      <section class="panel">
        <h2>Add Item</h2>
        <form id="item-form">
          <label>Title <input name="title" required /></label>
          <label>URL <input type="url" name="url" required /></label>
          <label>Tags (comma separated) <input name="tags" /></label>
          <label>Notes <textarea name="notes" rows="3"></textarea></label>
          <button type="submit">Save</button>
        </form>
      </section>

      <section class="panel">
        <h2>Library</h2>
        <label>Search <input id="search" placeholder="Search title, notes, tags" /></label>
        <ul id="items"></ul>
        <p id="empty">No items yet. Add your first saved link.</p>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
